name: Apply brief decision docs checkpoint

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'docs/close-brief-decision-checkpoint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply checkpoint
        run: node scripts/apply-brief-decision-doc-checkpoint.mjs

      - name: Commit canonical documentation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "Documentation already aligned."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ROADMAP.md docs/STATUS.md docs/NEXT.md docs/ARCHITECTURE.md docs/DECISIONS.md docs/FRONTEND-PLAN.md apps/web/README.md
          git commit -m "Close brief decision production checkpoint"
          git push origin HEAD:${{ github.head_ref }}
