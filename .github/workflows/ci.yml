name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install browser for UI smoke tests
        run: npx playwright install --with-deps chromium

      - name: Generate Cloudflare binding types
        run: npm run types

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log

      - name: Build Astro and custom Worker entrypoint
        run: npm run build

      - name: Upload typecheck log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
          if-no-files-found: error

      - name: Validate D1 migrations
        run: npm run db:migrate:local

      - name: Smoke-test research quality gate
        run: npm run smoke:quality

      - name: Evaluate research gate against golden labels
        run: npm run eval:research-quality

      - name: Build last30days container
        run: docker build --platform linux/amd64 -t senza-roaming-last30days:ci containers/last30days

      - name: Smoke-test container image
        shell: bash
        run: |
          set -euo pipefail
          container_id="$(docker run -d -p 18080:8080 senza-roaming-last30days:ci)"
          trap 'docker logs "$container_id" || true; docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/health > /tmp/container-health.json; then
              cat /tmp/container-health.json
              exit 0
            fi
            sleep 1
          done

          echo "Container did not become healthy in time."
          exit 1

      - name: Smoke-test Astro and backend in workerd
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:runtime 2>&1 | tee runtime-smoke.log

      - name: Upload runtime smoke log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-log
          path: runtime-smoke.log
          if-no-files-found: error

      - name: Smoke-test Control Room hydration and interaction
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:ui 2>&1 | tee control-room-ui-smoke.log

      - name: Smoke-test Control Room claims, sources and expiry
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:claims 2>&1 | tee control-room-claims-smoke.log

      - name: Smoke-test Control Room readiness and evidence bundles
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:readiness 2>&1 | tee control-room-readiness-smoke.log

      - name: Smoke-test Control Room draft decisions
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:drafts 2>&1 | tee control-room-drafts-smoke.log

      - name: Smoke-test Control Room complete draft detail
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:draft-detail 2>&1 | tee control-room-draft-detail-smoke.log

      - name: Smoke-test Control Room queue and audit
        shell: bash
        run: |
          set -o pipefail
          npm run smoke:queue-audit 2>&1 | tee control-room-queue-audit-smoke.log

      - name: Upload Control Room UI smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: control-room-ui-smoke-log
          path: |
            control-room-ui-smoke.log
            control-room-claims-smoke.log
            control-room-readiness-smoke.log
            control-room-drafts-smoke.log
            control-room-draft-detail-smoke.log
            control-room-queue-audit-smoke.log
          if-no-files-found: warn

      - name: Verify production migration and Control Room
        if: github.event_name == 'pull_request' && github.head_ref == 'ops/verify-control-room-production'
        env:
          CLOUDFLARE_ACCOUNT_ID: 60496826f56a093a72602bfae074fdcf
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          SENZA_ROAMING_SITE_URL: https://senzaroaming.it
        run: node scripts/verify-control-room-production.mjs

      - name: Upload production verification evidence
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'ops/verify-control-room-production'
        uses: actions/upload-artifact@v4
        with:
          name: production-verification
          path: production-verification
          if-no-files-found: warn
